<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortLink Pro - URL Shortener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #c0c0c0;
            font-size: 0.9rem;
        }

        input[type="url"] {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        input[type="url"]::placeholder {
            color: #606060;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            color: #00ff88;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .short-link {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            color: #00ff88;
            margin-bottom: 15px;
        }

        .copy-btn {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .copy-btn:hover {
            background: rgba(0, 255, 136, 0.3);
        }

        .error {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff4757;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .stats {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats h3 {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .link-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .link-item:last-child {
            margin-bottom: 0;
        }

        .link-item .short {
            color: #00d9ff;
            font-weight: bold;
        }

        .link-item .long {
            color: #a0a0a0;
            word-break: break-all;
            margin-top: 5px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Mobile responsive */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                width: 95%;
            }

            h1 {
                font-size: 1.5rem;
            }

            input[type="url"],
            button {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 ShortLink Pro</h1>
        <p class="subtitle">Create short links instantly - stored locally in your browser</p>

        <div class="input-group">
            <label for="longUrl">Enter your long URL</label>
            <input 
                type="url" 
                id="longUrl" 
                placeholder="https://example.com/very/long/url/here"
                required
            >
        </div>

        <button onclick="generateShortLink()">Generate Short Link</button>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <p class="result-label">✨ Your short link is ready:</p>
            <div class="short-link" id="shortLink"></div>
            <button class="copy-btn" onclick="copyToClipboard()">📋 Copy Link</button>
        </div>

        <div class="stats" id="stats">
            <h3>📊 Your Links</h3>
            <div class="link-list" id="linkList"></div>
        </div>
    </div>

    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadLinks();
        });

        // Generate random ID for short link
        function generateRandomId(length = 6) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Get base URL for short links
        function getBaseUrl() {
            const protocol = window.location.protocol;
            const host = window.location.host;
            const path = window.location.pathname;
            const basePath = path.substring(0, path.lastIndexOf('/') + 1);
            return `${protocol}//${host}${basePath}`;
        }

        // Generate short link
        function generateShortLink() {
            const longUrlInput = document.getElementById('longUrl');
            const longUrl = longUrlInput.value.trim();
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');

            // Validate URL
            if (!longUrl) {
                showError('Please enter a URL');
                return;
            }

            // Simple URL validation
            try {
                new URL(longUrl);
            } catch (e) {
                showError('Please enter a valid URL (include http:// or https://)');
                return;
            }

            // Generate unique short ID
            let shortId = generateRandomId();
            let links = getLinks();

            // Ensure uniqueness
            while (links[shortId]) {
                shortId = generateRandomId();
            }

            // Store the link
            links[shortId] = {
                longUrl: longUrl,
                createdAt: new Date().toISOString(),
                clicks: 0
            };

            saveLinks(links);

            // Create short link URL
            const baseUrl = getBaseUrl();
            const shortLink = `${baseUrl}redirect.html?id=${shortId}`;

            // Display result
            document.getElementById('shortLink').textContent = shortLink;
            resultDiv.classList.add('show');
            errorDiv.classList.remove('show');

            // Clear input
            longUrlInput.value = '';

            // Reload links list
            loadLinks();
        }

        // Copy to clipboard
        function copyToClipboard() {
            const shortLink = document.getElementById('shortLink').textContent;
            navigator.clipboard.writeText(shortLink).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = shortLink;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            document.getElementById('result').classList.remove('show');
        }

        // Get links from localStorage
        function getLinks() {
            const links = localStorage.getItem('shortlink_pro_links');
            return links ? JSON.parse(links) : {};
        }

        // Save links to localStorage
        function saveLinks(links) {
            localStorage.setItem('shortlink_pro_links', JSON.stringify(links));
        }

        // Load and display links
        function loadLinks() {
            const links = getLinks();
            const linkList = document.getElementById('linkList');
            
            const linkIds = Object.keys(links);
            
            if (linkIds.length === 0) {
                linkList.innerHTML = '<p style="color: #606060; text-align: center;">No links created yet</p>';
                return;
            }

            let html = '';
            const baseUrl = getBaseUrl();

            // Sort by creation date (newest first)
            linkIds.sort((a, b) => {
                return new Date(links[b].createdAt) - new Date(links[a].createdAt);
            });

            // Show only last 10 links
            linkIds.slice(0, 10).forEach(id => {
                const link = links[id];
                const shortLink = `${baseUrl}redirect.html?id=${id}`;
                html += `
                    <div class="link-item">
                        <div class="short">${shortLink}</div>
                        <div class="long">${link.longUrl}</div>
                    </div>
                `;
            });

            linkList.innerHTML = html;
        }
    </script>
</body>
</html>
